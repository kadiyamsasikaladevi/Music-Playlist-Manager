<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Playlist Manager</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #121212;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .player {
        width: 400px;
        background: #1e1e1e;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
        text-align: center;
    }

    ul {
        list-style: none;
        padding: 0;
        max-height: 200px;
        overflow-y: auto;
    }

    li {
        padding: 10px;
        margin: 5px 0;
        background: #2a2a2a;
        border-radius: 5px;
        cursor: pointer;
    }

    li.active {
        background: #1db954;
    }

    .controls {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 15px;
    }

    button {
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #1db954;
        color: white;
        font-weight: bold;
    }

    button:hover {
        opacity: 0.9;
    }

    .seek-container {
        margin-top: 15px;
    }

    input[type="range"] {
        width: 100%;
    }

    .time {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin-top: 5px;
    }
</style>
</head>
<body>

<div class="player">
    <h2>🎵 Music Playlist Manager</h2>

    <ul id="playlist"></ul>

    <div class="controls">
        <button onclick="prevTrack()">⏮ Prev</button>
        <button onclick="togglePlay()">▶ Play/Pause</button>
        <button onclick="nextTrack()">⏭ Next</button>
    </div>

    <div class="seek-container">
        <input type="range" id="seekSlider" value="0" min="0" max="100">
        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <audio id="audio"></audio>
</div>

<script>
const tracks = [
{
    title: "Sample Track 1",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
},
{
    title: "Sample Track 2",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
},
{
    title: "Sample Track 3",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
}
];

const audio = document.getElementById("audio");
const playlist = document.getElementById("playlist");
const seekSlider = document.getElementById("seekSlider");
const currentTimeDisplay = document.getElementById("currentTime");
const durationDisplay = document.getElementById("duration");

let currentTrack = 0;

// Build Playlist
tracks.forEach((track, index) => {
    const li = document.createElement("li");
    li.textContent = track.title;
    li.onclick = () => loadTrack(index);
    playlist.appendChild(li);
});

function updatePlaylistUI() {
    document.querySelectorAll("#playlist li").forEach((item, index) => {
        item.classList.toggle("active", index === currentTrack);
    });
}

function loadTrack(index) {
    currentTrack = index;
    audio.src = tracks[index].src;
    audio.play();
    updatePlaylistUI();
}

function togglePlay() {
    if (!audio.src) {
        loadTrack(currentTrack);
        return;
    }

    if (audio.paused) {
        audio.play();
    } else {
        audio.pause();
    }
}

function nextTrack() {
    currentTrack = (currentTrack + 1) % tracks.length;
    loadTrack(currentTrack);
}

function prevTrack() {
    currentTrack =
        (currentTrack - 1 + tracks.length) % tracks.length;
    loadTrack(currentTrack);
}

audio.addEventListener("timeupdate", () => {
    const progress =
        (audio.currentTime / audio.duration) * 100 || 0;

    seekSlider.value = progress;

    currentTimeDisplay.textContent =
        formatTime(audio.currentTime);
});

audio.addEventListener("loadedmetadata", () => {
    durationDisplay.textContent =
        formatTime(audio.duration);
});

seekSlider.addEventListener("input", () => {
    const seekTime =
        (seekSlider.value / 100) * audio.duration;

    audio.currentTime = seekTime;
});

audio.addEventListener("ended", nextTrack);

function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60)
        .toString()
        .padStart(2, "0");

    return `${mins}:${secs}`;
}

loadTrack(0);
</script>

</body>
</html>
